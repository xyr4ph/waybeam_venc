name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # в”Ђв”Ђ Unit tests (gate) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: make test

  # в”Ђв”Ђ Cross-compile builds в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  build-star6e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Star6E toolchain
        run: make toolchain
      - name: Build Star6E waybeam
        run: make build SOC_BUILD=star6e
      - name: Build Star6E json_cli
        run: make json_cli SOC_BUILD=star6e
      - name: Build Star6E regscan
        run: make regscan SOC_BUILD=star6e
      - name: Stage Star6E
        run: make stage SOC_BUILD=star6e
      - name: Verify output
        run: |
          test -x out/star6e/waybeam
          test -x out/star6e/json_cli
          test -x out/star6e/regscan
      - name: Upload Star6E staged output
        uses: actions/upload-artifact@v4
        with:
          name: waybeam-star6e
          # Exclude obj/ вЂ” incremental build dirs are not release content
          path: |
            out/star6e/
            !out/star6e/obj/

  build-maruko:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Maruko toolchain
        run: make toolchain-maruko
      - name: Build Maruko waybeam
        run: make build SOC_BUILD=maruko
      - name: Build Maruko json_cli
        run: make json_cli SOC_BUILD=maruko
      - name: Build Maruko regscan
        run: make regscan SOC_BUILD=maruko
      - name: Stage Maruko
        run: make stage SOC_BUILD=maruko
      - name: Verify output
        run: |
          test -x out/maruko/waybeam
          test -x out/maruko/json_cli
          test -x out/maruko/regscan
          # Vendored sensor .ko (renamed _maruko.ko в†’ _mipi.ko by stage)
          test -f out/maruko/drivers/sensor_imx335_mipi.ko
          test -f out/maruko/drivers/sensor_imx415_mipi.ko
          # Vendored ISP tuning blobs
          test -f out/maruko/isp-bins/imx335.bin
          test -f out/maruko/isp-bins/imx415.bin
      - name: Upload Maruko staged output
        uses: actions/upload-artifact@v4
        with:
          name: waybeam-maruko
          path: |
            out/maruko/
            !out/maruko/obj/

  # в”Ђв”Ђ Create/update release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  release:
    runs-on: ubuntu-latest
    needs: [build-star6e, build-maruko]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Star6E artifact
        uses: actions/download-artifact@v4
        with:
          name: waybeam-star6e
          path: release/star6e

      - name: Download Maruko artifact
        uses: actions/download-artifact@v4
        with:
          name: waybeam-maruko
          path: release/maruko

      - name: Prepare release archives
        run: |
          for backend in star6e maruko; do
            mkdir -p "release/waybeam-${backend}"
            mv "release/${backend}/waybeam"  "release/waybeam-${backend}/waybeam"
            mv "release/${backend}/json_cli" "release/waybeam-${backend}/json_cli"
            mv "release/${backend}/regscan"  "release/waybeam-${backend}/regscan"
            # Maruko-only payloads: MI vendor libs, sensor .ko, ISP .bin.
            if [ -d "release/${backend}/lib" ]; then
              mv "release/${backend}/lib"      "release/waybeam-${backend}/lib"
            fi
            if [ -d "release/${backend}/drivers" ]; then
              mv "release/${backend}/drivers"  "release/waybeam-${backend}/drivers"
            fi
            if [ -d "release/${backend}/isp-bins" ]; then
              mv "release/${backend}/isp-bins" "release/waybeam-${backend}/isp-bins"
            fi
            # Backend-specific default config; Maruko has its own template
            # (sensor.unlockEnabled defaults differ between SoCs).
            if [ "${backend}" = "maruko" ] && [ -f config/waybeam.default.maruko.json ]; then
              cp config/waybeam.default.maruko.json "release/waybeam-${backend}/waybeam.json"
            else
              cp config/waybeam.default.json "release/waybeam-${backend}/waybeam.json"
            fi
            # BusyBox init.d wrapper.
            cp init.d/S95waybeam "release/waybeam-${backend}/S95waybeam"
            chmod +x "release/waybeam-${backend}/waybeam"
            chmod +x "release/waybeam-${backend}/json_cli"
            chmod +x "release/waybeam-${backend}/regscan"
            chmod +x "release/waybeam-${backend}/S95waybeam"
            tar -czf "release/waybeam-${backend}.tar.gz" -C release "waybeam-${backend}"
          done

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (v${{ steps.version.outputs.version }})"
          body: |
            Automated build from `master` branch.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}

            ## Binaries

            | File | Backend | SoC | Contents |
            |------|---------|-----|----------|
            | `waybeam-star6e.tar.gz` | Star6E | SSC30KQ / SSC338Q (Infinity6E) | `waybeam` + `json_cli` + `regscan` + `waybeam.json` |
            | `waybeam-maruko.tar.gz` | Maruko | SSC378QE (Infinity6C)         | `waybeam` + `json_cli` + `regscan` + `waybeam.json` + `lib/` (MI libs) + `drivers/` (sensor .ko) + `isp-bins/` (IQ tuning) |

            **Bundled tools:**

            - `json_cli` вЂ” style-preserving JSON config get/set/del tool
              (vendored from `waybeam-hub/tools/`) used by deploy scripts and
              on-device automation to read and patch `/etc/waybeam.json`.
            - `regscan` вЂ” IMX335/IMX415 i2c register dumper for sensor-init
              diagnostics (vendored from `tipoman9/star6c_sensor`).  Read-only,
              safe to leave in `/usr/bin/`.

            **Maruko bundle additions:**

            - `drivers/sensor_imx{335,415}_mipi.ko` вЂ” source-built modified
              sensor drivers from `drivers/sensor_imx*_maruko.c`.  Drop-in
              replacement for stock OpenIPC `_mipi.ko` (already renamed in
              the tarball).
            - `isp-bins/imx{335,415,415_fpv_api}.bin` вЂ” ISP tuning blobs,
              loaded at startup via `isp.sensorBin`.

            ## Install

            ```bash
            tar -xzf waybeam-<backend>.tar.gz -C /tmp
            cp /tmp/waybeam-<backend>/waybeam      /usr/bin/waybeam
            cp /tmp/waybeam-<backend>/json_cli     /usr/bin/json_cli
            cp /tmp/waybeam-<backend>/regscan      /usr/bin/regscan
            cp /tmp/waybeam-<backend>/waybeam.json /etc/waybeam.json
            cp /tmp/waybeam-<backend>/S95waybeam   /etc/init.d/S95waybeam

            # Maruko only вЂ” stock OpenIPC Infinity6C firmware does not ship MI libs:
            cp /tmp/waybeam-maruko/lib/*.so     /usr/lib/

            # Maruko only вЂ” drop in the modified sensor drivers (replaces stock):
            cp /tmp/waybeam-maruko/drivers/*.ko /lib/modules/$(uname -r)/sigmastar/
            depmod -a

            # Maruko only вЂ” ISP tuning blobs:
            cp /tmp/waybeam-maruko/isp-bins/*.bin /etc/sensors/

            # Maruko only вЂ” vendor lib libcam_os_wrapper.so has hardcoded
            # NEEDED tags for these two uClibc loader names; create them so
            # the dynamic linker resolves on stock musl firmware:
            ln -sf libc.so /lib/ld-uClibc.so.1
            ln -sf libc.so /lib/libc.so.0

            # Maruko only вЂ” reboot to load the new sensor .ko:
            reboot
            ```

            ## Runtime library requirements

            **Star6E / Infinity6E:** all MI libs ship in stock OpenIPC firmware
            (`/rom/usr/lib/`). No bundled libraries вЂ” the tarball is binary-only.
            The binary `dlopen`s at runtime: `libmi_sys`, `libmi_isp`, `libmi_venc`,
            `libmi_rgn`, `libmi_sensor`, `libmi_vpe`, `libmi_vif`, `libmi_ai`,
            `libispalgo`, `libcam_os_wrapper`, `libcus3a`, `libopus` *(optional вЂ” Opus
            audio falls back to PCM if missing)*.

            **Maruko / Infinity6C:** stock OpenIPC firmware does **not** ship MI
            vendor libs, so the tarball bundles 10+ `.so` files (~2 MB) in `lib/`.
            Copy them to `/usr/lib/` on first install. Required: `libmi_sys`,
            `libmi_isp`, `libmi_venc`, `libmi_scl`, `libmi_sensor`, `libmi_vif`,
            `libmi_common`, `libispalgo`, `libcam_os_wrapper`, `libcus3a`. Source
            and MD5s in `vendor-libs/maruko/` in the repo.

            **Maruko sensor drivers:** the bundled `drivers/sensor_imx*_mipi.ko`
            are built from `drivers/sensor_imx*_maruko.c` and intended as
            drop-in replacements for stock OpenIPC `_mipi.ko`.  See
            `sensors/maruko/README.md` for provenance.

            See [README](https://github.com/${{ github.repository }}/blob/master/README.md) for usage.
          files: |
            release/waybeam-star6e.tar.gz
            release/waybeam-maruko.tar.gz
          prerelease: false
          make_latest: true

  # в”Ђв”Ђ Telegram notification (optional) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  notify:
    runs-on: ubuntu-latest
    needs: [release]
    if: vars.TELEGRAM_TOKEN != ''
    steps:
      - name: Send Telegram notification
        env:
          TG_TOKEN: ${{ vars.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ vars.TELEGRAM_CHAT }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d parse_mode=Markdown \
            -d text="вњ… *waybeam* release updated%0AVersion: $(cat VERSION)%0ACommit: ${GITHUB_SHA:0:7}"
